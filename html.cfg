\Preamble{xhtml}

\Configure{tableofcontents*}{chapter,section,subsection}

\Css{html {
    overflow-x: hidden;
    max-width: 100vw;
}}

\Css{body img, body pre, body code, body table {
    max-width: 100\%;
}}

\Css{@font-face {
  font-family: Manrope;
  src: url(Manrope_variable.ttf);
}}

\Css{body {
    box-sizing: border-box;
    width: auto;
    max-width: none;
    min-height: 100vh;
    padding: 1rem 2rem 2rem 24rem;
    margin: 0;
    overflow-x: hidden;
    background-color: \#F4ECD8;
    color: \#5B464B;
    line-height: 1.5;
}}

\Css{body > :not(.tableofcontents) {
    box-sizing: border-box;
    width: auto;
    max-width: 70rem;
    margin-left: 0;
    margin-right: 0;
}}

\Css{.tableofcontents {
    position: fixed;
    top: 1rem;
    left: 1rem;
    bottom: 1rem;
    z-index: 10;
    width: 19rem;
    max-width: none;
    margin: 0;
    overflow-y: auto;
    padding: 1.5rem 1.25rem 2rem;
    border-right: 1px solid \#d6c6aa;
    background: linear-gradient(180deg, \#efe4ca 0\%, \#eadcbf 100\%);
    box-shadow: inset -1px 0 0 rgba(91, 70, 75, 0.08);
}}

\Css{.tableofcontents::before {
    content: "Contents";
    display: block;
    margin-bottom: 1rem;
    font-family: Manrope;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: \#5B464B;
}}

\Css{.chapterToc, .sectionToc, .subsectionToc {
    display: block;
    font-family: Manrope;
}}

\Css{.chapterToc {
    margin-top: 1.1rem;
    padding-top: 0.9rem;
    border-top: 1px solid rgba(91, 70, 75, 0.14);
    font-size: 1rem;
    font-weight: 800;
    line-height: 1.45;
}}

\Css{.chapterToc:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
}}

\Css{.chapterToc a {
    color: \#5B464B;
    text-decoration: none;
    line-height: inherit;
    font-weight: inherit;
}}

\Css{.sectionToc {
    margin-top: 0.35rem;
    margin-left: 0;
    font-size: 0.95rem;
    line-height: 1.45;
}}

\Css{.sectionToc a {
    color: \#7a5a4f;
    text-decoration: none;
}}

\Css{.subsectionToc {
    margin-top: 0.18rem;
    margin-left: 0.9rem;
    font-size: 0.82rem;
    line-height: 1.35;
}}

\Css{.subsectionToc a {
    color: \#6b4f54;
    text-decoration: none;
}}

\Css{.tableofcontents a {
    overflow-wrap: anywhere;
    word-break: break-word;
}}

\Css{.tableofcontents a:hover {
    color: \#0060DF;
    text-decoration: underline;
}}

\Css{.likechapterHead\#contents {
    display: none;
}}

\Css{a {
    color: \#0060DF;
}}

\Css{a:focus-visible {
    outline: 3px solid \#0060DF;
    outline-offset: 2px;
    border-radius: 2px;
}}

\Css{p, a {
    font-size: 1.2rem;
    font-family: Manrope;
}}

\Css{p + pre {
    font-size: 1.1em;
}}

\Css{div.author {
    white-space: normal;
}}

\Css{.maketitle {
    min-height: auto;
    padding: 0;
    margin-top: 3rem;
    margin-bottom: 1rem;
}}

\Css{.maketitle + p {
    width: min(24rem, 100\%);
    max-width: 24rem;
    float: none;
    margin: 1.5rem auto 2rem;
}}

\Css{.maketitle + p img {
    display: block;
    width: 100\%;
    max-width: 100\%;
    max-height: 78vh;
    margin: 0;
}}

\Css{.maketitle .titleHead {
    margin: 0;
    text-align: center;
    font-family: Manrope;
    max-width: none;
    font-size: clamp(1.6rem, 7.5vw, 4.6rem);
    line-height: 1;
    letter-spacing: -0.04em;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
}}

\Css{.maketitle .author {
    text-align: center;
    max-width: none;
    margin-top: 1.5rem;
    color: \#735c61;
}}

\Css{.maketitle .author span {
    font-size: 1.55rem;
    line-height: 1.5;
}}

\Css{.maketitle .date {
    text-align: center;
    margin-top: 1rem;
    max-width: none;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: \#8c7277;
}}

\Css{img.math {
    height: 1rem;
    vertical-align: top;
}}

\Css{pre.fancyvrb {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
}}

\Css{figure, .fancyvrb, .verbatim {
    margin-inline: 0;
}}

\Css{.ecrm-0500 {
    font-size: 70\%;
    font-style: italic;
    color: gray;
    min-width: 1.75rem;
    padding-right: 0.5rem;
    box-sizing: content-box;
    text-align: right;
    display: inline-block;
    -webkit-user-select: none;
    -moz-user-select: none;
    -o-user-select: none;
    user-select: none;
}}

\Css{.page-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
    margin: 0 0 1.5rem;
}}

\Css{.toc-toggle {
    display: none;
}}

\Css{.toc-backdrop {
    display: none;
}}

\Css{@media (max-width: 1100px) {
    body {
        padding: 1rem 1rem 2rem;
    }
    body > :not(.tableofcontents):not(.toc-toggle):not(.toc-backdrop) {
        width: auto;
        max-width: none;
        margin-left: auto;
        margin-right: auto;
    }
    /* Mobile drawer: hide TOC offscreen by default. */
    .tableofcontents {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: min(85vw, 22rem);
        max-width: none;
        height: 100vh;
        margin: 0;
        padding: 4rem 1.25rem 2rem;
        border: 0;
        border-right: 1px solid \#d6c6aa;
        border-radius: 0;
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.08);
        transform: translateX(-100\%);
        transition: transform 0.25s ease-out;
        z-index: 1000;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }
    body.toc-open .tableofcontents {
        transform: translateX(0);
    }
    /* Backdrop: dimmed overlay when drawer is open. */
    .toc-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(91, 70, 75, 0.45);
        z-index: 999;
        animation: lkmpg-fadein 0.2s ease-out;
    }
    body.toc-open .toc-backdrop {
        display: block;
    }
    /* Hamburger button: fixed top-left. */
    .toc-toggle {
        display: flex;
        position: fixed;
        top: 0.85rem;
        left: 0.85rem;
        z-index: 1001;
        width: 2.6rem;
        height: 2.6rem;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0.3rem;
        padding: 0;
        background: rgba(244, 236, 216, 0.96);
        border: 1px solid \#d6c6aa;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(91, 70, 75, 0.18);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    .toc-toggle span {
        display: block;
        width: 1.3rem;
        height: 2px;
        background: \#5B464B;
        border-radius: 2px;
        transition: transform 0.2s ease, opacity 0.15s ease;
    }
    /* Animate hamburger to "X" when drawer is open. */
    body.toc-open .toc-toggle span:nth-child(1) {
        transform: translateY(0.5rem) rotate(45deg);
    }
    body.toc-open .toc-toggle span:nth-child(2) {
        opacity: 0;
    }
    body.toc-open .toc-toggle span:nth-child(3) {
        transform: translateY(-0.5rem) rotate(-45deg);
    }
    /* Push title down a bit so the hamburger doesn't overlap. */
    .maketitle {
        min-height: auto;
        margin-top: 1.5rem;
    }
    .page-actions {
        justify-content: center;
        margin-top: 0;
        padding-left: 3.5rem;
    }
    .maketitle + p {
        width: min(22rem, 100\%);
        max-width: 22rem;
        margin-top: 1rem;
    }
    /* Lock body scroll when drawer is open. */
    body.toc-open {
        overflow: hidden;
    }
}}

\Css{@keyframes lkmpg-fadein {
    from { opacity: 0; }
    to { opacity: 1; }
}}

\Css{@media (max-width: 900px) {
    .maketitle + p {
        width: 100\%;
        max-width: 24rem;
        margin: 1rem auto 0;
    }
    .maketitle .titleHead,
    .maketitle .author,
    .maketitle .date {
        max-width: none;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
    }
    .maketitle + p img {
        max-height: none;
        margin: 0 auto;
    }
}}

\Css{@media (max-width: 700px) {
    p, a {
        font-size: 1rem;
    }
    .maketitle .author span {
        font-size: 1.2rem;
    }
    pre.fancyvrb {
        font-size: 0.85rem;
        padding: 0.5em 0.7em;
    }
}}

\Css{@media (max-width: 480px) {
    body {
        padding: 0 0.75rem 2rem;
    }
    .maketitle .author span {
        font-size: 1rem;
    }
    .ecrm-0500 {
        min-width: 1.4rem;
        padding-right: 0.4em;
        font-size: 0.85em;
    }
}}

\Css{@media (pointer: coarse) {
    .tableofcontents a {
        padding: 0.25rem 0;
        line-height: 1.6;
    }
    .subsectionToc {
        font-size: 0.95rem;
    }
}}

\Css{@media print {
    body {
        display: block;
        padding: 0;
    }
    .tableofcontents {
        position: static;
        width: auto;
        max-height: none;
        border-right: 0;
        box-shadow: none;
        background: none;
        page-break-after: always;
    }
    .page-actions {
        display: none;
    }
    .maketitle {
        min-height: auto;
        margin: 0;
    }
    .maketitle .titleHead,
    .maketitle .author,
    .maketitle .date {
        max-width: none;
    }
    .maketitle + p {
        float: none;
        width: auto;
        max-width: 20rem;
        margin: 1rem 0 0;
    }
}}

